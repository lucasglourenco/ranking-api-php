services:
  mysql:
    image: mysql:8
    container_name: ranking_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ranking
      MYSQL_USER: ranking_user
      MYSQL_PASSWORD: ranking_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: